name: "CI - Tests"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-build-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  msrv:
    name: msrv
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.90"
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets

  test:
    name: test
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: 1
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: llvm-tools
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run tests with coverage
        run: cargo llvm-cov test --lcov --output-path lcov.info -- --no-capture

      - name: Run doc tests
        run: cargo test --doc --all-features

      - uses: astral-sh/setup-uv@v6

      - name: Validate published hook manifest
        run: uvx prek validate-manifest .pre-commit-hooks.yaml

      - name: Smoke-test project-aware build
        run: |
          cargo run --release --bin spore -- new ci-build-smoke
          cd ci-build-smoke
          ../target/release/spore build

      - name: Smoke-test stdlib specs
        run: cargo run --release --bin spore -- test stdlib/math.sp stdlib/string.sp stdlib/collections.sp stdlib/char.sp stdlib/set.sp stdlib/dict.sp

      - name: Smoke-test sporec CLI
        run: |
          cargo run --release --bin sporec -- explain E0001
          cargo run --release --bin sporec -- compile examples/demo.sp
          cat > /tmp/sporec-hole-smoke.sp <<'EOF'
          fn main() -> I32 {
              ?todo
          }
          EOF
          cargo run --release --bin sporec -- holes --json /tmp/sporec-hole-smoke.sp > /tmp/sporec-holes.json
          grep -q '"holes"' /tmp/sporec-holes.json
          cargo run --release --bin sporec -- query-hole --json /tmp/sporec-hole-smoke.sp '?todo' > /tmp/sporec-hole.json
          grep -q '"name"' /tmp/sporec-hole.json

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false

  package-cli:
    name: package-cli
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v6
      - uses: Swatinem/rust-cache@v2

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: v1.12.6
          command: build
          args: --release --locked --out dist

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: v1.12.6
          command: sdist
          args: --out dist

      - name: Install packaged CLI
        run: |
          uv sync --locked

      - name: Smoke-test built wheel
        run: |
          uv tool run --from ./dist/spore_cli-*.whl spore run examples/demo.sp > /tmp/spore-wheel.out
          grep -qx '204' /tmp/spore-wheel.out
          uv tool run --from ./dist/spore_cli-*.whl spore check examples/demo.sp
          uv tool run --from ./dist/spore_cli-*.whl spore test examples/demo.sp
